<!-- The HTML document for the Final Exam-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tech Workshop Registration Form</title>
</head>
<body>
    <!-- The main header for the form-->
  <h1>Tech Workshop Registration Form</h1>
    <!-- Thank you message container (where the message will be displayed)-->
  <div id="thankyouMessage"></div>
    <!-- The registration form id when called from JS-->
  <form id="Form">
<!-- The name field -->
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your full name" required />
    <br /><br />
<!-- The email field -->
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="your-email" required />
    <br /><br />
<!-- The experience level field (which I don't know if this is to be included or not?)-->
    <label for="level">Experience </label>
    <select id="level" name="level">
      <option value="Beginner">Beginner</option>
      <option value="Intermediate">Intermediate</option>
      <option value="Advanced">Advanced</option>
    </select>
    <br /><br />
<!-- adding the type of button-->
    <button type="submit">Submit</button>

  </form>
<!-- The Javascript -->
  <script src="script.js"></script>

</body>
</html>
